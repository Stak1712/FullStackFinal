name: Fullstack CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-interview-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests with coverage
        env:
          ENV: test
          DEBUG: "false"
          JWT_SECRET: ci_test_secret
          DATABASE_URL: sqlite:///./data/ci_test.db
          STORAGE_PROVIDER: local
          STORAGE_LOCAL_ROOT: ./data/ci_object_storage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=65

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-interview-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-interview-frontend/package-lock.json

      - name: Install frontend dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit/component tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ai-interview-frontend/dist

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ai-interview-frontend/dist

      - name: Validate compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build

  deploy-placeholder:
    runs-on: ubuntu-latest
    needs:
      - docker-build

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment hook
        run: echo "Images are validated. Add server credentials or registry publishing here for production deployment."
