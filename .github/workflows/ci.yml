name: Fullstack CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-interview-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests with coverage
        env:
          ENV: test
          DEBUG: "false"
          JWT_SECRET: ci_test_secret
          DATABASE_URL: sqlite:///./data/ci_test.db
          STORAGE_PROVIDER: local
          STORAGE_LOCAL_ROOT: ./data/ci_object_storage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=65

